# =============================================================================
# WanderP - 开发环境 Docker Compose Override 配置
# =============================================================================
# 使用方式:
#   启动基础设施:  docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up -d
#   停止基础设施:  docker compose -f docker-compose.yaml -f docker-compose.dev.yaml down
#
# 此文件仅启动基础设施服务，不启动应用服务。
# 应用服务应在本地开发环境中运行，便于调试和热重载。
# =============================================================================

services:
  # ===========================================================================
  # 禁用所有应用服务 - 仅保留基础设施
  # ===========================================================================
  gateway:
    profiles:
      - disabled

  user-service:
    profiles:
      - disabled

  planner:
    profiles:
      - disabled

  map-service:
    profiles:
      - disabled

  notification:
    profiles:
      - disabled

  ai-engine:
    profiles:
      - disabled

  # ===========================================================================
  # 基础设施服务 - 开发环境优化配置
  # ===========================================================================

  # PostgreSQL - 开发环境暴露调试端口
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    command: >
      postgres
      -c log_statement=all
      -c log_min_duration_statement=100
      -c log_connections=yes
      -c log_disconnections=yes

  # Redis - 开发环境开启更多日志
  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:-wanderp_redis_2024} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --loglevel debug

  # InfluxDB - 开发环境
  influxdb:
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"

  # MongoDB - 开发环境
  mongodb:
    command: mongod --auth --slowms 50

  # MinIO - 开发环境
  minio:
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  # EMQX - 开发环境开启匿名认证便于调试
  emqx:
    environment:
      EMQX_ALLOW_ANONYMOUS: "true"
      EMQX_LISTENERS__TCP__DEFAULT__MAX_CONNECTIONS: "1024000"
