version: "3.9"

# =============================================================================
# WanderP - 智能旅行规划平台 Docker Compose 配置
# =============================================================================
# 使用方式:
#   启动所有服务:  docker compose up -d
#   启动基础设施:  docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up -d
#   查看日志:      docker compose logs -f <service_name>
#   停止所有服务:  docker compose down
# =============================================================================

services:
  # ===========================================================================
  # 基础设施服务
  # ===========================================================================

  # PostgreSQL 16 - 主数据库
  postgres:
    image: postgres:16-alpine
    container_name: wanderp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wanderp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wanderp_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-wanderp}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wanderp} -d ${POSTGRES_DB:-wanderp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wanderp-net

  # Redis 7 - 缓存与消息队列
  redis:
    image: redis:7-alpine
    container_name: wanderp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-wanderp_redis_2024} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-wanderp_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wanderp-net

  # Milvus 2.x - 向量数据库 (standalone模式)
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: wanderp-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - milvus_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - wanderp-net

  milvus-minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: wanderp-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: ${MILVUS_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MILVUS_MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - wanderp-net

  milvus:
    image: milvusdb/milvus:v2.4.16
    container_name: wanderp-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9091}:9091"
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    networks:
      - wanderp-net

  # InfluxDB 2.x - 时序数据库
  influxdb:
    image: influxdb:2.7
    container_name: wanderp-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER:-wanderp}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-wanderp_influx_2024}
      DOCKER_INFLUXDB_INIT_ORG: wanderp
      DOCKER_INFLUXDB_INIT_BUCKET: wanderp
      DOCKER_INFLUXDB_INIT_RETENTION: 30d
      TZ: Asia/Shanghai
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wanderp-net

  # MongoDB 7 - 文档数据库
  mongodb:
    image: mongo:7
    container_name: wanderp-mongodb
    restart: unless-stopped
    command: mongod --auth
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-wanderp_mongo_2024}
      MONGO_INITDB_DATABASE: wanderp
      TZ: Asia/Shanghai
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_ROOT_USER:-root}", "-p", "${MONGO_ROOT_PASSWORD:-wanderp_mongo_2024}", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wanderp-net

  # MinIO - 对象存储
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: wanderp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wanderp_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-wanderp_minio_2024}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    networks:
      - wanderp-net

  # EMQX 5.x - MQTT消息代理
  emqx:
    image: emqx/emqx:5.7.0
    container_name: wanderp-emqx
    restart: unless-stopped
    environment:
      EMQX_LOADED_PLUGINS: "emqx_dashboard,emqx_auth_mnesia"
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-wanderp_emqx_2024}
      EMQX_LISTENERS__TCP__DEFAULT__BIND: "0.0.0.0:1883"
      EMQX_LISTENERS__WS__DEFAULT__BIND: "0.0.0.0:8083"
      EMQX_LISTENERS__WSS__DEFAULT__BIND: "0.0.0.0:8084"
      TZ: Asia/Shanghai
    ports:
      - "${EMQX_MQTT_PORT:-1883}:1883"
      - "${EMQX_WS_PORT:-8083}:8083"
      - "${EMQX_WSS_PORT:-8084}:8084"
      - "${EMQX_DASHBOARD_PORT:-18083}:18083"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wanderp-net

  # ===========================================================================
  # 应用服务
  # ===========================================================================

  # Gateway - API网关服务
  gateway:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runtime
      args:
        - SERVICE=gateway
    container_name: wanderp-gateway
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - GATEWAY_PORT=8080
      - POSTGRES_DSN=postgres://${POSTGRES_USER:-wanderp}:${POSTGRES_PASSWORD:-wanderp_dev_2024}@postgres:5432/${POSTGRES_DB:-wanderp}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD:-wanderp_redis_2024}@redis:6379/0
      - USER_SERVICE_URL=http://user-service:8001
      - PLANNER_SERVICE_URL=http://planner:8002
      - MAP_SERVICE_URL=http://map-service:8003
      - NOTIFICATION_SERVICE_URL=http://notification:8004
      - AI_ENGINE_URL=http://ai-engine:8005
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wanderp-net

  # User Service - 用户服务
  user-service:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runtime
      args:
        - SERVICE=user
    container_name: wanderp-user-service
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - USER_SERVICE_PORT=8001
      - POSTGRES_DSN=postgres://${POSTGRES_USER:-wanderp}:${POSTGRES_PASSWORD:-wanderp_dev_2024}@postgres:5432/${POSTGRES_DB:-wanderp}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD:-wanderp_redis_2024}@redis:6379/0
      - MONGO_URL=mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-wanderp_mongo_2024}@mongodb:27017/wanderp?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
    ports:
      - "${USER_SERVICE_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wanderp-net

  # Planner Service - 规划服务
  planner:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runtime
      args:
        - SERVICE=planner
    container_name: wanderp-planner
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - PLANNER_SERVICE_PORT=8002
      - POSTGRES_DSN=postgres://${POSTGRES_USER:-wanderp}:${POSTGRES_PASSWORD:-wanderp_dev_2024}@postgres:5432/${POSTGRES_DB:-wanderp}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD:-wanderp_redis_2024}@redis:6379/0
      - AI_ENGINE_URL=http://ai-engine:8005
    ports:
      - "${PLANNER_SERVICE_PORT:-8002}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wanderp-net

  # Map Service - 地图服务
  map-service:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runtime
      args:
        - SERVICE=map
    container_name: wanderp-map-service
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - MAP_SERVICE_PORT=8003
      - REDIS_URL=redis://:${REDIS_PASSWORD:-wanderp_redis_2024}@redis:6379/0
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-}
      - INFLUXDB_ORG=wanderp
      - INFLUXDB_BUCKET=wanderp
      - AMAP_API_KEY=${AMAP_API_KEY:-}
      - MQTT_BROKER=tcp://emqx:1883
    ports:
      - "${MAP_SERVICE_PORT:-8003}:8003"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - wanderp-net

  # Notification Service - 通知服务
  notification:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runtime
      args:
        - SERVICE=notification
    container_name: wanderp-notification
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - NOTIFICATION_SERVICE_PORT=8004
      - REDIS_URL=redis://:${REDIS_PASSWORD:-wanderp_redis_2024}@redis:6379/0
      - MQTT_BROKER=tcp://emqx:1883
      - MQTT_USERNAME=${EMQX_MQTT_USER:-}
      - MQTT_PASSWORD=${EMQX_MQTT_PASSWORD:-}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8004}:8004"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - wanderp-net

  # AI Engine - AI引擎服务 (Python)
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: wanderp-ai-engine
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - AI_ENGINE_PORT=8005
      - REDIS_URL=redis://:${REDIS_PASSWORD:-wanderp_redis_2024}@redis:6379/0
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - AMAP_API_KEY=${AMAP_API_KEY:-}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - FEIZHU_API_KEY=${FEIZHU_API_KEY:-}
      - JUHE_API_KEY=${JUHE_API_KEY:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
    ports:
      - "${AI_ENGINE_PORT:-8005}:8005"
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - wanderp-net

# =============================================================================
# 网络配置
# =============================================================================
networks:
  wanderp-net:
    name: wanderp-net
    driver: bridge

# =============================================================================
# 数据卷配置
# =============================================================================
volumes:
  postgres_data:
    name: wanderp-postgres-data
  redis_data:
    name: wanderp-redis-data
  milvus_data:
    name: wanderp-milvus-data
  milvus_etcd_data:
    name: wanderp-milvus-etcd-data
  milvus_minio_data:
    name: wanderp-milvus-minio-data
  influxdb_data:
    name: wanderp-influxdb-data
  influxdb_config:
    name: wanderp-influxdb-config
  mongodb_data:
    name: wanderp-mongodb-data
  mongodb_config:
    name: wanderp-mongodb-config
  minio_data:
    name: wanderp-minio-data
  emqx_data:
    name: wanderp-emqx-data
  emqx_log:
    name: wanderp-emqx-log
